services:
  - type: web
    name: antibrouteur-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: REPORT_THRESHOLD
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: antibrouteur-db
          property: connectionString

databases:
  - name: antibrouteur-db
    plan: free
